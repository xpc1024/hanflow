services:
  engine:
    build: ../..
    ports: ["8000:8000"]
    environment:
      HANFLOW_INLINE_WORKER: "true"
      DB_URL: postgres+asyncpg://hanflow:hanflow@postgres:5432/hanflow
    volumes:
      - ./hanflow.yaml.example:/app/hanflow.yaml
      - ../../workflows:/app/workflows
      - ../../workspace:/app/workspace
    depends_on: [postgres, redis, minio]
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: hanflow
      POSTGRES_PASSWORD: hanflow
      POSTGRES_DB: hanflow
    volumes: ["pgdata:/var/lib/postgresql/data"]
  redis:
    image: redis:7
  minio:
    image: minio/minio
    command: server /data
    volumes: ["miniodata:/data"]
volumes:
  pgdata: {}
  miniodata: {}
