services:
  engine:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    environment:
      - HANFLOW__WORKSPACE_ROOT=/workspace
      - HANFLOW__DB_URL=postgresql://hanflow:hanflow@postgres:5432/hanflow
      - HANFLOW_API_KEY=${HANFLOW_API_KEY:-}
      - HANFLOW_SERVER__INLINE_WORKER=true
    volumes:
      - ../../workflows:/workflows
      - ../../workspace:/workspace
      - ../../hanflow.yaml:/config/hanflow.yaml
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.web
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - engine

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hanflow
      POSTGRES_PASSWORD: hanflow
      POSTGRES_DB: hanflow
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
